<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VG Dashboard — Regional utveckling</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --vg-blue: #0b3d5c;
    --vg-blue-light: #1d6fa3;
    --vg-accent: #c8553d;
    --bg: #f6f5f2;
    --panel: #ffffff;
    --border: #dcd9d2;
    --text: #2b2b28;
    --text-muted: #6b6862;
    --scale-1: #fdf0e0;
    --scale-2: #f6c89f;
    --scale-3: #e2935f;
    --scale-4: #c8602f;
    --scale-5: #8c3a16;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  header {
    background: var(--vg-blue);
    color: white;
    padding: 18px 28px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.3rem;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  header .subtitle {
    font-size: 0.85rem;
    color: #c9dceb;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    min-height: calc(100vh - 64px);
  }

  .controls {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
  }

  .control-group {
    margin-bottom: 22px;
  }

  .control-group label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 600;
  }

  select, input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 0.9rem;
    background: white;
    color: var(--text);
  }

  select:disabled {
    background: #f0efec;
    color: var(--text-muted);
  }

  .meta-box {
    background: #f0f4f7;
    border-left: 3px solid var(--vg-blue-light);
    padding: 10px 12px;
    font-size: 0.8rem;
    color: var(--text-muted);
    border-radius: 0 4px 4px 0;
    line-height: 1.4;
  }

  .main {
    display: grid;
    grid-template-rows: minmax(380px, 55vh) 1fr;
    gap: 0;
  }

  #map {
    width: 100%;
    height: 100%;
    background: #e8e6e1;
  }

  .table-panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 24px;
  }

  .table-panel h2 {
    font-size: 0.95rem;
    margin: 0 0 12px 0;
    color: var(--vg-blue);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  thead th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 2px solid var(--border);
    color: var(--text-muted);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover {
    color: var(--vg-blue);
  }

  thead th.sorted::after {
    content: " ▾";
    font-size: 0.7rem;
  }

  tbody td {
    padding: 7px 12px;
    border-bottom: 1px solid #efeeea;
  }

  tbody tr:hover {
    background: #f7f9fb;
  }

  .legend {
    position: absolute;
    bottom: 18px;
    right: 18px;
    background: rgba(255,255,255,0.95);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 0.75rem;
    box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    z-index: 500;
  }

  .legend-scale {
    display: flex;
    height: 10px;
    border-radius: 2px;
    overflow: hidden;
    margin: 6px 0 4px 0;
  }

  .legend-scale span { flex: 1; }

  .legend-labels {
    display: flex;
    justify-content: space-between;
    color: var(--text-muted);
    font-size: 0.7rem;
  }

  .map-wrap {
    position: relative;
  }

  .leaflet-tooltip {
    font-family: inherit;
    font-size: 0.8rem;
  }

  .status-line {
    font-size: 0.75rem;
    color: var(--text-muted);
    padding: 6px 0 0 0;
  }

  .status-line.error { color: var(--vg-accent); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cfccc4; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>VG Dashboard</h1>
  <span class="subtitle">Regional utveckling i Västra Götalands kommuner</span>
</header>

<div class="layout">
  <aside class="controls">

    <div class="control-group">
      <label for="indikator-select">Indikator</label>
      <select id="indikator-select"></select>
    </div>

    <div class="control-group" id="ar-group">
      <label for="ar-select">År</label>
      <select id="ar-select"></select>
    </div>

    <div class="control-group" id="bransch-group" style="display:none;">
      <label for="bransch-select">Näringsgren</label>
      <select id="bransch-select"></select>
    </div>

    <div class="control-group" id="kon-group" style="display:none;">
      <label for="kon-select">Kön</label>
      <select id="kon-select"></select>
    </div>

    <div class="control-group">
      <div class="meta-box" id="meta-box">Laddar indikatorer …</div>
    </div>

    <div class="status-line" id="status-line"></div>

  </aside>

  <div class="main">
    <div class="map-wrap">
      <div id="map"></div>
      <div class="legend" id="legend" style="display:none;">
        <div id="legend-title">Skala</div>
        <div class="legend-scale" id="legend-scale"></div>
        <div class="legend-labels" id="legend-labels"></div>
      </div>
    </div>
    <div class="table-panel">
      <h2 id="table-title">Kommunvärden</h2>
      <table id="data-table">
        <thead>
          <tr>
            <th data-key="kommun_namn">Kommun</th>
            <th data-key="varde">Värde</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Konfiguration
// ---------------------------------------------------------------------------
const SUPABASE_URL = "https://xqeyxlonarwcqykbemsg.supabase.co";
const SUPABASE_KEY = "sb_publishable_f_plG5zfiWjL9jWco0T-ww_D1Bd7Caq";

const headers = {
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY
};

// ---------------------------------------------------------------------------
// Tillstånd
// ---------------------------------------------------------------------------
let geojsonLayer = null;
let map = null;
let currentData = [];      // alla rader för vald indikator (alla år/bransch/kön)
let filteredData = [];     // efter år/bransch/kön-filter, en rad per kommun
let sortKey = "kommun_namn";
let sortAsc = true;
let kommunNamnByKod = {};

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
async function init() {
  initMap();
  await loadIndikatorer();
  document.getElementById("indikator-select").addEventListener("change", onIndikatorChange);
  document.getElementById("ar-select").addEventListener("change", applyFiltersAndRender);
  document.getElementById("bransch-select").addEventListener("change", applyFiltersAndRender);
  document.getElementById("kon-select").addEventListener("change", applyFiltersAndRender);
  document.querySelectorAll("thead th[data-key]").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.getAttribute("data-key");
      if (sortKey === key) { sortAsc = !sortAsc; } else { sortKey = key; sortAsc = true; }
      renderTable();
    });
  });
}

function setStatus(msg, isError) {
  const el = document.getElementById("status-line");
  el.textContent = msg || "";
  el.className = "status-line" + (isError ? " error" : "");
}

// ---------------------------------------------------------------------------
// Karta
// ---------------------------------------------------------------------------
function initMap() {
  map = L.map("map", { scrollWheelZoom: true }).setView([58.2, 12.9], 7.6);

  const geojson = JSON.parse(document.getElementById("geojson-data").textContent);
  geojson.features.forEach(f => {
    kommunNamnByKod[f.properties.kommun_kod] = f.properties.kommun;
  });

  geojsonLayer = L.geoJSON(geojson, {
    style: () => ({ color: "#ffffff", weight: 1, fillColor: "#e8e6e1", fillOpacity: 0.9 }),
    onEachFeature: (feature, layer) => {
      layer.bindTooltip(feature.properties.kommun, { sticky: true });
      layer.on("mouseover", () => {
        layer.setStyle({ weight: 2.5, color: "#0b3d5c", fillColor: layer._currentFill || "#e8e6e1" });
      });
      layer.on("mouseout", () => {
        layer.setStyle({ weight: 1, color: "#ffffff", fillColor: layer._currentFill || "#e8e6e1" });
      });
    }
  }).addTo(map);
}

function colorScale(value, min, max) {
  if (value === null || value === undefined || isNaN(value)) return "#e8e6e1";
  if (max === min) return "#e2935f";
  const t = (value - min) / (max - min);
  const colors = ["#fdf0e0", "#f6c89f", "#e2935f", "#c8602f", "#8c3a16"];
  const idx = Math.min(colors.length - 1, Math.floor(t * colors.length));
  return colors[idx];
}

function updateMapColors() {
  console.log("[updateMapColors] filteredData.length =", filteredData.length);
  console.log("[updateMapColors] geojsonLayer finns?", !!geojsonLayer);

  if (!filteredData.length) {
    geojsonLayer.setStyle({ fillColor: "#e8e6e1" });
    document.getElementById("legend").style.display = "none";
    return;
  }

  const values = filteredData.map(d => d.varde).filter(v => v !== null && v !== undefined);
  const min = Math.min(...values);
  const max = Math.max(...values);
  console.log("[updateMapColors] min =", min, "max =", max, "values.length =", values.length);

  const byKommun = {};
  filteredData.forEach(d => { byKommun[d.kommun_kod] = d.varde; });
  console.log("[updateMapColors] byKommun (exempel):", Object.entries(byKommun).slice(0, 3));

  let matched = 0, unmatched = 0;
  let loggedOnce = false;
  geojsonLayer.eachLayer(layer => {
    const kod = layer.feature.properties.kommun_kod;
    const val = byKommun[kod];
    if (val !== undefined) { matched++; } else { unmatched++; }
    const fill = colorScale(val, min, max);
    if (!loggedOnce) {
      console.log("[updateMapColors] EXEMPEL: kod=", kod, "val=", val, "fill=", fill, "layer.setStyle finns?", typeof layer.setStyle);
      loggedOnce = true;
    }
    layer.setStyle({ fillColor: fill, fillOpacity: 0.88 });
    layer._currentFill = fill;
    const label = val !== undefined
      ? `<strong>${layer.feature.properties.kommun}</strong><br>${formatValue(val)}`
      : `<strong>${layer.feature.properties.kommun}</strong><br><em>Ingen data</em>`;
    layer.unbindTooltip();
    layer.bindTooltip(label, { sticky: true });
  });
  console.log("[updateMapColors] matched =", matched, "unmatched =", unmatched);
  console.log("[updateMapColors] Ett exempel-lager direkt efter loop, dess options.fillColor:", geojsonLayer.getLayers()[0].options.fillColor);

  renderLegend(min, max);
}

function renderLegend(min, max) {
  const legend = document.getElementById("legend");
  legend.style.display = "block";
  const colors = ["#fdf0e0", "#f6c89f", "#e2935f", "#c8602f", "#8c3a16"];
  document.getElementById("legend-scale").innerHTML =
    colors.map(c => `<span style="background:${c}"></span>`).join("");
  document.getElementById("legend-labels").innerHTML =
    `<span>${formatValue(min)}</span><span>${formatValue(max)}</span>`;
}

function formatValue(v) {
  if (v === null || v === undefined || isNaN(v)) return "—";
  return new Intl.NumberFormat("sv-SE", { maximumFractionDigits: 2 }).format(v);
}

// ---------------------------------------------------------------------------
// Hämta indikatorlista
// ---------------------------------------------------------------------------
async function loadIndikatorer() {
  setStatus("Laddar indikatorlista …");
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/vg_indikatorer?aktiv=eq.true&select=kpi,beskrivning,enhet,kalla`,
      { headers }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const indikatorer = await res.json();

    const select = document.getElementById("indikator-select");
    select.innerHTML = "";
    indikatorer.forEach(ind => {
      const opt = document.createElement("option");
      opt.value = ind.kpi;
      opt.textContent = `${ind.beskrivning} (${ind.kalla})`;
      opt.dataset.enhet = ind.enhet || "";
      select.appendChild(opt);
    });

    setStatus(`${indikatorer.length} indikatorer tillgängliga.`);
    if (indikatorer.length) {
      await loadDataForIndikator(select.value);
    }
  } catch (err) {
    setStatus("Kunde inte ladda indikatorlistan: " + err.message, true);
  }
}

async function onIndikatorChange() {
  const kpi = document.getElementById("indikator-select").value;
  await loadDataForIndikator(kpi);
}

// ---------------------------------------------------------------------------
// Hämta data för vald indikator (paginerat, eftersom Supabase begränsar
// antal rader per anrop oavsett vad man sätter i ?limit=)
// ---------------------------------------------------------------------------
async function fetchAllPages(kpi) {
  const pageSize = 1000;
  let page = 0;
  let all = [];

  while (true) {
    const from = page * pageSize;
    const to = from + pageSize - 1;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/vg_kommundata?kpi=eq.${encodeURIComponent(kpi)}&select=kommun_kod,kommun_namn,ar,bransch,kon,varde,enhet`,
      {
        headers: {
          ...headers,
          "Range-Unit": "items",
          "Range": `${from}-${to}`
        }
      }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const batch = await res.json();
    console.log(`[fetchAllPages] page=${page} from=${from} to=${to} batch.length=${batch.length} content-range=${res.headers.get("content-range")}`);
    all = all.concat(batch);

    setStatus(`Hämtar data för ${kpi} … (${all.length} rader hittills)`);

    if (batch.length < pageSize) break;  // sista sidan nådd
    page++;
    if (page > 50) break;  // säkerhetsspärr mot oändlig loop
  }

  console.log(`[fetchAllPages] KLAR. Totalt antal rader: ${all.length}`);
  return all;
}

async function loadDataForIndikator(kpi) {
  setStatus("Hämtar data för " + kpi + " …");
  try {
    currentData = await fetchAllPages(kpi);

    setStatus(`${currentData.length} rader laddade.`);
    updateMetaBox(kpi);
    populateYearFilter();
    console.log("[loadDataForIndikator] efter populateYearFilter");
    populateBranschFilter();
    console.log("[loadDataForIndikator] efter populateBranschFilter");
    populateKonFilter();
    console.log("[loadDataForIndikator] efter populateKonFilter, anropar applyFiltersAndRender nu");
    applyFiltersAndRender();
    console.log("[loadDataForIndikator] efter applyFiltersAndRender");
  } catch (err) {
    setStatus("Kunde inte hämta data: " + err.message, true);
    currentData = [];
    filteredData = [];
    updateMapColors();
    renderTable();
  }
}

function updateMetaBox(kpi) {
  const select = document.getElementById("indikator-select");
  const opt = select.options[select.selectedIndex];
  const enhet = opt ? opt.dataset.enhet : "";
  document.getElementById("meta-box").innerHTML =
    `<strong>${opt ? opt.textContent : kpi}</strong><br>Enhet: ${enhet || "okänd"}`;
}

// ---------------------------------------------------------------------------
// Filteruppsättning (år / bransch / kön) — döljs om bara ett värde finns
// ---------------------------------------------------------------------------
function uniqueSorted(values) {
  return [...new Set(values)].sort();
}

function populateYearFilter() {
  const years = uniqueSorted(currentData.map(d => d.ar)).reverse();
  const select = document.getElementById("ar-select");
  select.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
  document.getElementById("ar-group").style.display = years.length > 1 ? "block" : "block";
}

function populateBranschFilter() {
  const branscher = uniqueSorted(currentData.map(d => d.bransch));
  const group = document.getElementById("bransch-group");
  const select = document.getElementById("bransch-select");

  if (branscher.length <= 1) {
    group.style.display = "none";
    return;
  }
  group.style.display = "block";
  const branschNamn = {
    "alla": "Alla branscher",
    "A": "Jordbruk, skogsbruk, fiske",
    "B+C": "Tillverkning, gruvor",
    "D+E": "Energi och miljö",
    "F": "Byggindustri",
    "G": "Handel",
    "H": "Transport, magasinering",
    "I": "Hotell, restaurang",
    "J": "Information, kommunikation",
    "K": "Kreditinstitut, försäkring",
    "L": "Fastighetsverksamhet",
    "M+N": "Juridik, ekonomi, teknik, uthyrning",
    "O": "Civila myndigheter, försvar",
    "P": "Utbildning",
    "Q": "Vård och omsorg",
    "R+S+T+U": "Kultur, nöje, annan service"
  };
  select.innerHTML = branscher.map(b =>
    `<option value="${b}">${branschNamn[b] || b}</option>`
  ).join("");
}

function populateKonFilter() {
  const koner = uniqueSorted(currentData.map(d => d.kon));
  const group = document.getElementById("kon-group");
  const select = document.getElementById("kon-select");

  if (koner.length <= 1) {
    group.style.display = "none";
    return;
  }
  group.style.display = "block";
  const konNamn = { "totalt": "Totalt", "man": "Män", "kvinna": "Kvinnor" };
  // Sätt "totalt" som default om det finns
  select.innerHTML = koner.map(k =>
    `<option value="${k}" ${k === "totalt" ? "selected" : ""}>${konNamn[k] || k}</option>`
  ).join("");
}

// ---------------------------------------------------------------------------
// Applicera filter och rendera
// ---------------------------------------------------------------------------
function applyFiltersAndRender() {
  console.log("[applyFiltersAndRender] START");
  const ar = document.getElementById("ar-select").value;
  const branschGroup = document.getElementById("bransch-group");
  const konGroup = document.getElementById("kon-group");

  const bransch = branschGroup.style.display !== "none"
    ? document.getElementById("bransch-select").value
    : null;
  const kon = konGroup.style.display !== "none"
    ? document.getElementById("kon-select").value
    : null;

  console.log("[applyFiltersAndRender] ar=", ar, "bransch=", bransch, "kon=", kon);

  filteredData = currentData.filter(d => {
    if (String(d.ar) !== String(ar)) return false;
    if (bransch !== null && d.bransch !== bransch) return false;
    if (kon !== null && d.kon !== kon) return false;
    return true;
  });

  console.log("[applyFiltersAndRender] filteredData.length =", filteredData.length, "anropar updateMapColors nu");
  updateMapColors();
  renderTable();
  console.log("[applyFiltersAndRender] KLAR");
}

// ---------------------------------------------------------------------------
// Tabell
// ---------------------------------------------------------------------------
function renderTable() {
  const tbody = document.getElementById("table-body");
  const sorted = [...filteredData].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === "varde") { av = av ?? -Infinity; bv = bv ?? -Infinity; }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  tbody.innerHTML = sorted.map(d => `
    <tr>
      <td>${d.kommun_namn}</td>
      <td>${formatValue(d.varde)}${d.enhet ? " " + d.enhet : ""}</td>
    </tr>
  `).join("");

  document.querySelectorAll("thead th[data-key]").forEach(th => {
    th.classList.toggle("sorted", th.getAttribute("data-key") === sortKey);
  });

  document.getElementById("table-title").textContent =
    `Kommunvärden (${sorted.length} kommuner)`;
}

// ---------------------------------------------------------------------------
init();

</script>
</body>
</html>
